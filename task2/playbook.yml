---
- name: "Task 2: Install DevOps Components (K8s, Minikube, Helm)"
  hosts: all
  become: yes
  vars:
    minikube_version: "latest"
    helm_version: "latest"

  tasks:
    # 1. Оновлення пакетів та встановлення базових залежностей
    - name: Update apt cache and install basic tools
      apt:
        update_cache: yes
        name:
          - curl
          - apt-transport-https
          - ca-certificates
          - gnupg
          - conntrack
        state: present

    # 2. Встановлення Docker
    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Ensure Docker is started and enabled
      service:
        name: docker
        state: started
        enabled: yes
      when: not ansible_check_mode

    # 3. Встановлення kubectl
    - name: Download kubectl binary
      get_url:
        url: "https://dl.k8s.io/release/{{ lookup('pipe', 'curl -L -s https://dl.k8s.io/release/stable.txt') }}/bin/linux/amd64/kubectl"
        dest: /usr/local/bin/kubectl
        mode: '0755'

    # 4. Встановлення Minikube
    - name: Download and Install Minikube
      get_url:
        url: https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
        dest: /usr/local/bin/minikube
        mode: '0755'

    # 5. Встановлення Helm
    - name: Install Helm via official script
      shell: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm

    # 6. Налаштування прав для користувача
    - name: Add current user to docker group
      user:
        name: root
        groups: docker
        append: yes
      when: not ansible_check_mode

    # 7. Запуск Minikube
    - name: Start Minikube with Docker driver
      command: minikube start --driver=docker --force
      become: yes
      changed_when: false
      when: not ansible_check_mode

    # --- НОВІ КРОКИ ДЛЯ ПРОКСІ ТА ДОСТУПУ ---

    # 8. Увімкнення Dashboard (опційно, для наочності)
    - name: Enable Minikube Dashboard
      command: minikube addons enable dashboard
      when: not ansible_check_mode
      changed_when: false

    # 9. Прокидання проксі (Proxy) для доступу ззовні
    # Використовуємо порт 8001, який ми відкрили в Terraform
    - name: Start kubectl proxy in background
      shell: |
        pkill -f 'kubectl proxy' || true
        nohup kubectl proxy --address='0.0.0.0' --port=8001 --accept-hosts='.*' </dev/null >/dev/null 2>&1 &
      when: not ansible_check_mode
      changed_when: false

    # ----------------------------------------

    # 10. Перевірка встановлення
    - name: Verify Installation
      shell: |
        kubectl version --client && \
        minikube status && \
        helm version && \
        ss -tuln | grep 8001
      register: install_verify
      changed_when: false
      when: not ansible_check_mode

    - name: Show Verification Result
      debug:
        msg: "{{ install_verify.stdout_lines }}"
      when: not ansible_check_mode