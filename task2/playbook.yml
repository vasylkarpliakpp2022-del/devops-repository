---
- name: Setup Kubernetes Environment
  hosts: all
  become: yes
  tasks:
    - name: Install Docker
      apt:
        name: docker.io
        state: present
        update_cache: yes

    - name: Add user to docker group
      user:
        name: root
        groups: docker
        append: yes

    - [cite_start]name: Install Minikube [cite: 34]
      get_url:
        url: https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
        dest: /usr/local/bin/minikube
        mode: '0755'

    - [cite_start]name: Install kubectl [cite: 33]
      snap:
        name: kubectl
        classic: yes

    - [cite_start]name: Install Helm [cite: 35]
      snap:
        name: helm
        classic: yes

    - name: Start Minikube with Docker driver
      command: minikube start --driver=docker --force
      become_user: root