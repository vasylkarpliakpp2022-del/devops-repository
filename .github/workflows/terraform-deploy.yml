name: "Task 1: Terraform Deploy"

on:
  # Запуск при пуші в основні гілки або вручну
  push:
    branches: [ "main", "develop" ]
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest
    
    env:
      # Налаштування секретів для DigitalOcean та S3-бекенду
      TF_VAR_do_token: ${{ secrets.DO_PAT }}
      TF_VAR_spaces_access_key: ${{ secrets.SPACES_ACCESS_KEY }}
      TF_VAR_spaces_secret_key: ${{ secrets.SPACES_SECRET_KEY }}
      
      AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_KEY }}
    
    defaults:
      run:
        working-directory: ./task1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # Ініціалізація: завантаження провайдерів та підключення до tfstate у хмарі
      - name: Terraform Init
        run: terraform init

      # ВИМОГА: Попередня перевірка змін без їхнього застосування
      - name: Terraform Plan (Dry-run)
        run: terraform plan

      # Реальне створення інфраструктури (тільки для гілки main)
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve