name: "Task 1: Terraform DESTROY (Danger Zone)"

on:
  # Тільки ручний запуск для запобігання випадковому видаленню
  workflow_dispatch:

jobs:
  terraform-destroy:
    runs-on: ubuntu-latest
    
    env:
      # Секрети для DigitalOcean та доступу до tfstate
      TF_VAR_do_token: ${{ secrets.DO_PAT }}
      TF_VAR_spaces_access_key: ${{ secrets.SPACES_ACCESS_KEY }}
      TF_VAR_spaces_secret_key: ${{ secrets.SPACES_SECRET_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_KEY }}
    
    defaults:
      run:
        # Виконання команд у директорії першого завдання
        working-directory: ./task1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # Ініціалізація та підключення до стану інфраструктури у хмарі
      - name: Terraform Init
        run: terraform init

      # ПОВНЕ видалення всіх створених ресурсів (ВМ, VPC, Firewall)
      - name: Terraform Destroy
        run: terraform destroy -auto-approve