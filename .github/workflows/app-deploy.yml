name: "Task 3: App Deploy to K8s"

on:
  # Тригери: пуш у гілки, тег 1.0.0 або ручний запуск
  push:
    branches: [ "develop", "main" ]
    tags: [ "1.0.0" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # Отримуємо код застосунку з репозиторію
      - name: Checkout app code
        uses: actions/checkout@v4
        with:
          repository: 'YulianSalo/devops-exam-pt2'
          ref: ${{ (github.ref_name == 'main' && 'develop') || github.ref_name }}

      # Авторизація на Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Збірка та пуш Docker-образу з відповідним тегом (dev або 1.0.0)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:${{ (github.ref_name == '1.0.0' && '1.0.0') || 'dev' }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      # Отримуємо маніфести (інфраструктурний код)
      - name: Checkout infrastructure code
        uses: actions/checkout@v4

      # Налаштування SSH для доступу до Droplet
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.DROPLET_IP }} >> ~/.ssh/known_hosts

      # Перевірка здоров'я Minikube та автозапуск при потребі
      - name: Ensure Minikube is Running
        run: |
          ssh -i ~/.ssh/id_rsa root@${{ secrets.DROPLET_IP }} "
            if ! kubectl cluster-info > /dev/null 2>&1; then
              minikube delete || true
              minikube start --driver=docker --force --memory=1900mb --cpus=2
              kubectl wait --for=condition=Ready nodes --all --timeout=60s || sleep 30
            fi
          "

      # Динамічна генерація маніфесту (заміна dev на release через sed)
      - name: Prepare Deployment Manifest
        run: |
          export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
          if [[ "${{ github.ref_name }}" == "1.0.0" ]]; then
            sed 's/namespace: dev/namespace: release/g; s/name: dev/name: release/g; s/app-dev/app-release/g; s/app-service-dev/app-service-release/g; s/:dev/:1.0.0/g' task3/dev-deployment.yaml > task3/release-deployment.yaml
            export FILE_NAME="release-deployment.yaml"
          else
            export FILE_NAME="dev-deployment.yaml"
          fi
          envsubst < task3/$FILE_NAME > final_deploy.yaml

      # ВИМОГА: Перевірка валідності маніфесту без розгортання
      - name: Kubernetes Dry-run Check
        run: |
          ssh -i ~/.ssh/id_rsa root@${{ secrets.DROPLET_IP }} "kubectl apply -f - --dry-run=client" < final_deploy.yaml

      # Реальне розгортання в Kubernetes
      - name: Deploy to Minikube
        run: |
          ssh -i ~/.ssh/id_rsa root@${{ secrets.DROPLET_IP }} "kubectl apply -f -" < final_deploy.yaml

      # Створення/оновлення Systemd-сервісу для стабільного прокидання портів
      - name: Setup Port-Forwarding via Systemd
        run: |
          PORT=${{ github.ref_name == '1.0.0' && '8003' || '8002' }}
          NS=${{ github.ref_name == '1.0.0' && 'release' || 'dev' }}
          SVC_NAME=${{ github.ref_name == '1.0.0' && 'app-service-release' || 'app-service-dev' }}
          
          cat <<EOF > setup-pf.sh
          #!/bin/bash
          cat <<INNER_EOF > /etc/systemd/system/port-forward-\$PORT.service
          [Unit]
          Description=K8s Port Forward \$PORT
          After=network.target
          [Service]
          User=root
          Environment=KUBECONFIG=/root/.kube/config
          ExecStart=/usr/local/bin/kubectl port-forward --address 0.0.0.0 svc/\$SVC_NAME \$PORT:80 -n \$NS
          Restart=always
          [Install]
          WantedBy=multi-user.target
          INNER_EOF
          systemctl daemon-reload
          systemctl enable port-forward-\$PORT.service
          systemctl restart port-forward-\$PORT.service
          EOF
          ssh -i ~/.ssh/id_rsa root@${{ secrets.DROPLET_IP }} "PORT=$PORT SVC_NAME=$SVC_NAME NS=$NS bash -s" < setup-pf.sh