name: "Task 3: App Deploy to K8s"

on:
  push:
    branches: [ "develop", "main" ]
    tags: [ "1.0.0" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app code
        uses: actions/checkout@v4
        with:
          repository: 'YulianSalo/devops-exam-pt2'
          ref: ${{ (github.ref_name == 'main' && 'develop') || github.ref_name }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:${{ (github.ref_name == '1.0.0' && '1.0.0') || 'dev' }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout infrastructure code
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.DROPLET_IP }} >> ~/.ssh/known_hosts

      # Новий крок: Перевірка та запуск Minikube, якщо він stopped
      - name: Ensure Minikube is Running
        run: |
          ssh -i ~/.ssh/id_rsa root@${{ secrets.DROPLET_IP }} "
            if ! minikube status | grep -q 'Running'; then
              echo 'Minikube is not running. Starting...'
              minikube start --driver=docker
            else
              echo 'Minikube is already running.'
            fi
          "

      - name: Prepare Deployment Manifest
        run: |
          export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
          if [[ "${{ github.ref_name }}" == "1.0.0" ]]; then
            if [ ! -f task3/release-deployment.yaml ]; then
              sed 's/namespace: dev/namespace: release/g; s/name: dev/name: release/g; s/app-dev/app-release/g; s/app-service-dev/app-service-release/g; s/:dev/:1.0.0/g' task3/dev-deployment.yaml > task3/release-deployment.yaml
            fi
            export FILE_NAME="release-deployment.yaml"
          else
            export FILE_NAME="dev-deployment.yaml"
          fi
          envsubst < task3/$FILE_NAME > final_deploy.yaml
          echo "FILE_NAME_USED=$FILE_NAME" >> $GITHUB_ENV

      - name: Kubernetes Dry-run Check
        run: |
          ssh -i ~/.ssh/id_rsa root@${{ secrets.DROPLET_IP }} "kubectl apply -f - --dry-run=client" < final_deploy.yaml

      - name: Deploy to Minikube
        run: |
          ssh -i ~/.ssh/id_rsa root@${{ secrets.DROPLET_IP }} "kubectl apply -f -" < final_deploy.yaml

      - name: Setup Port-Forwarding
        run: |
          export PORT=${{ github.ref_name == '1.0.0' && '8003' || '8002' }}
          export NS=${{ github.ref_name == '1.0.0' && 'release' || 'dev' }}
          export SVC_NAME=${{ github.ref_name == '1.0.0' && 'app-service-release' || 'app-service-dev' }}
          
          # Очищення старих процесів
          ssh -i ~/.ssh/id_rsa root@${{ secrets.DROPLET_IP }} "pkill -f 'kubectl port-forward' || true"
          
          # Запуск у фоні з примусовим від'єднанням SSH сесії (-f)
          ssh -f -i ~/.ssh/id_rsa root@${{ secrets.DROPLET_IP }} "nohup kubectl port-forward --address 0.0.0.0 svc/$SVC_NAME $PORT:80 -n $NS > /dev/null 2>&1 &"