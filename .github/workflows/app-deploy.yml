name: "Task 3: App Deploy to K8s"

on:
  push:
    # Додано main, щоб конвеєр запускався при твоїх поточних пушах
    branches: [ "develop", "main" ]
    tags: [ "1.0.0" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app code
        uses: actions/checkout@v4
        with:
          repository: 'YulianSalo/devops-exam-pt2'
          # Якщо ми в main, але хочемо зібрати код з develop (для тесту) — можна змінити тут. 
          # Зараз береться код тієї гілки, яка ініціювала конвеєр.
          ref: ${{ (github.ref_name == 'main' && 'develop') || github.ref_name }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Логіка тегів: develop/main -> dev, 1.0.0 -> 1.0.0
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:${{ (github.ref_name == '1.0.0' && '1.0.0') || 'dev' }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout infrastructure code
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.DROPLET_IP }} >> ~/.ssh/known_hosts

      # Підстановка логіна та Dry-run (Вимога завдання)
      - name: Kubernetes Dry-run Check
        run: |
          export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
          # Визначаємо, який файл маніфесту брати
          export FILE_NAME=${{ github.ref_name == '1.0.0' && 'release-deploy.yaml' || 'dev-deploy.yaml' }}
          envsubst < task3/$FILE_NAME > temp_deploy.yaml
          ssh -i ~/.ssh/id_rsa root@${{ secrets.DROPLET_IP }} "kubectl apply -f - --dry-run=client" < temp_deploy.yaml

      # Реальний деплой
      - name: Deploy to Minikube
        run: |
          export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
          export FILE_NAME=${{ github.ref_name == '1.0.0' && 'release-deploy.yaml' || 'dev-deploy.yaml' }}
          envsubst < task3/$FILE_NAME > temp_deploy.yaml
          ssh -i ~/.ssh/id_rsa root@${{ secrets.DROPLET_IP }} "kubectl apply -f -" < temp_deploy.yaml

      # Port-forwarding (Порада з завдання)
      - name: Setup Port-Forwarding
        run: |
          # Якщо це не тег 1.0.0, вважаємо це dev-середовищем
          export PORT=${{ github.ref_name == '1.0.0' && '8003' || '8002' }}
          export NS=${{ github.ref_name == '1.0.0' && 'release' || 'dev' }}
          export SVC_NAME=${{ github.ref_name == '1.0.0' && 'app-service-release' || 'app-service-dev' }}
          
          # Очищаємо старі процеси проксі, щоб не було конфліктів портів
          ssh -i ~/.ssh/id_rsa root@${{ secrets.DROPLET_IP }} "pkill -f 'kubectl port-forward' || true"
          
          # Запускаємо новий port-forward
          ssh -i ~/.ssh/id_rsa root@${{ secrets.DROPLET_IP }} "nohup kubectl port-forward --address 0.0.0.0 svc/$SVC_NAME $PORT:80 -n $NS > /dev/null 2>&1 &"