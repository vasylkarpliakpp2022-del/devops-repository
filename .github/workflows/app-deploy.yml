name: "Task 3: App Deploy to K8s"

on:
  push:
    branches: [ "develop" ]
    tags: [ "1.0.0" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app code
        uses: actions/checkout@v4
        with:
          repository: 'YulianSalo/devops-exam-pt2'
          ref: ${{ github.ref_name }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:${{ github.ref_name == 'develop' && 'dev' || github.ref_name }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout infrastructure code
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.DROPLET_IP }} >> ~/.ssh/known_hosts

      # Підстановка логіна та Dry-run (Вимога завдання)
      - name: Kubernetes Dry-run Check
        run: |
          export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
          export FILE_NAME=${{ github.ref_name == 'develop' && 'dev-deploy.yaml' || 'release-deploy.yaml' }}
          envsubst < task3/$FILE_NAME > temp_deploy.yaml
          ssh -i ~/.ssh/id_rsa root@${{ secrets.DROPLET_IP }} "kubectl apply -f - --dry-run=client" < temp_deploy.yaml

      # Реальний деплой
      - name: Deploy to Minikube
        run: |
          export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
          export FILE_NAME=${{ github.ref_name == 'develop' && 'dev-deploy.yaml' || 'release-deploy.yaml' }}
          envsubst < task3/$FILE_NAME > temp_deploy.yaml
          ssh -i ~/.ssh/id_rsa root@${{ secrets.DROPLET_IP }} "kubectl apply -f -" < temp_deploy.yaml

      # Port-forwarding (Порада з завдання)
      - name: Setup Port-Forwarding
        run: |
          export PORT=${{ github.ref_name == 'develop' && '8002' || '8003' }}
          export NS=${{ github.ref_name == 'develop' && 'dev' || 'release' }}
          ssh -i ~/.ssh/id_rsa root@${{ secrets.DROPLET_IP }} "pkill kubectl port-forward || true"
          ssh -i ~/.ssh/id_rsa root@${{ secrets.DROPLET_IP }} "nohup kubectl port-forward --address 0.0.0.0 svc/app-service-$NS $PORT:80 -n $NS > /dev/null 2>&1 &"