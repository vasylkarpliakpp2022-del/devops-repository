apiVersion: v1
kind: Namespace
metadata:
  name: dev
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-dev
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-app-dev
  template:
    metadata:
      labels:
        app: my-app-dev
    spec:
      containers:
      - name: app
        # ВИПРАВЛЕНО: синтаксис для envsubst (без ${{ }})
        image: ${DOCKERHUB_USERNAME}/devops-app:dev 
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: app-service-dev
  namespace: dev
spec:
  # Залишаємо ClusterIP (дефолт), бо ми все одно робимо port-forward
  selector:
    app: my-app-dev
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080